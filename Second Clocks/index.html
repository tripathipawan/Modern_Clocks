<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Advanced World Clock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="min-h-screen flex items-center justify-center bg-black text-white">

  <div class="flex flex-col items-center gap-6">

    <!-- CONTROLS -->
    <div class="flex flex-wrap gap-2 justify-center bg-black/50 px-4 py-3 rounded-xl border border-[aqua]">
      <select id="zoneSelect"
        class="text-[aqua] bg-black border border-[aqua] px-3 py-2 rounded transition-all duration-300 hover:shadow-lg hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-400">
        <option value="local">Local</option>
        <option value="Asia/Kolkata">India</option>
        <option value="America/New_York">New York</option>
        <option value="Europe/London">London</option>
        <option value="Asia/Tokyo">Tokyo</option>
      </select>

      <select id="themeSelect" class="text-[aqua] bg-black border border-[aqua] px-3 py-2 rounded transition-all duration-300 hover:shadow-lg hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-400">
        <option value="blue">Default Theme</option>
        <option value="pink">Pink</option>
        <option value="green">Green</option>
        <option value="yellow">Yellow</option>
        <option value="orange">Orange</option>
        <option value="white">White</option>
      </select>
    </div>

    <!-- CLOCK -->
    <div id="clock" class="clock cyberpunk relative w-80 h-80 rounded-full backdrop-blur-xl border border-[aqua]">

      <div id="numbers" class="absolute inset-0 text-[aqua]"></div>

      <div class="absolute inset-0 flex items-center justify-center">
        <div id="hour" class="hand w-2 h-20 bg-white rounded-full absolute bottom-1/2"></div>
        <div id="minute" class="hand w-1.5 h-28 bg-cyan-400 rounded-full absolute bottom-1/2"></div>
        <div id="second" class="hand w-1 h-32 bg-red-500 rounded-full absolute bottom-1/2"></div>
        <div class="w-4 h-4 bg-white rounded-full absolute z-50"></div>
      </div>
    </div>

    <!-- DIGITAL -->
    <div class="bg-white/10 border border-[aqua] px-10 py-4 rounded-xl text-center">
      <div id="digital" class="text-3xl font-mono text-[aqua]"></div>
      <div id="date" class="text-sm text-[aqua]"></div>
      <div id="zoneLabel" class="text-xs text-cyan-400 mt-1"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
