<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Animated Clock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-dark">
    <div class="container mx-auto px-4 py-8">
        <div class="clock-container mx-auto">
            <h1 class="text-4xl text-black  font-bold text-center mb-2 text-white fade-in">Modern Animated Clock</h1>
            <p class="text-center text-slate-300 mb-8 fade-in">Smooth animations with real-time updates</p>
            
            <!-- Analog Clock -->
            <div class="clock-face fade-in" id="clock-face">
                <!-- Hour marks and numbers will be generated with JavaScript -->
            </div>
            
            <!-- Digital Clock -->
            <div class="digital-clock fade-in" style="animation-delay: 0.2s;">
                <div class="flex flex-col items-center">
                    <div class="time-display" id="digital-time">00:00:00</div>
                    <div class="date-display mt-2" id="digital-date">Monday, January 1, 2023</div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="flex flex-wrap justify-center gap-4 mt-8">
                <button id="theme-toggle" class="toggle-btn px-6 py-3 rounded-full font-medium flex items-center gap-2 fade-in" style="animation-delay: 0.3s;">
                    <i class="fas fa-sun"></i> Toggle Theme
                </button>
                <button id="smooth-toggle" class="toggle-btn px-6 py-3 rounded-full font-medium flex items-center gap-2 fade-in" style="animation-delay: 0.5s;">
                    <i class="fas fa-wave-square"></i> Smooth Motion: ON
                </button>
            </div>
            
            <!-- Current Timezone -->
            <div class="text-center mt-8 text-slate-400 text-sm fade-in" style="animation-delay: 0.7s;">
                <i class="fas fa-globe mr-2"></i> Timezone: <span id="timezone">Local Time</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
